<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buổi 5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <style>
      h1 {
        font-family: "Dancing Script", cursive, serif;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: 700;
      }
    </style>
  </head>
  <body>
    <h1>Buổi 5</h1>
    <p>tôi yêu việt nam</p>
    <!-- FONT CHỮ 
   1.SERIF     : font chữ "có" chân
   2.SAN-SERIF : font chữ "không" chân
     -> Nguồn font tham khảo: google font
     -> 5 font thường dùng: Roboto(khuyên dùng), Open San, Inter, Montserrat, Arimo
   -->

    <!-- Thẻ marquee: lỗi thời - không nê sử dụng -->
    <hr />
    <marquee behavior="" direction="right">
      <img
        src="img/flag-vietnam_1f1fb-1f1f3.png"
        alt="cờ việt nam"
        width="20"
        height="20"
      />
      Hello việt nam
      <img
        src="img/flag-vietnam_1f1fb-1f1f3.png"
        alt="cờ việt nam"
        width="20"
        height="20"
      />
    </marquee>
    <hr />
    <br />

    <!-- Thẻ audio - âm thanh -->
    <audio
      controls="controls"
      src="https://www.w3schools.com/TAGS/horse.ogg"
    ></audio>
    <br />

    <!-- Thẻ video-->
    <video
      controls="controls"
      src="https://www.w3schools.com/tags/movie.mp4"
    ></video>
  </body>
</html>
